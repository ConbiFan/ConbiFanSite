<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="favicon.png">
  <title>Conbi Fan - Owner</title>
  <style>
    :root {
      --bg: #09111f;
      --panel: rgba(15, 23, 42, 0.86);
      --border: rgba(148, 163, 184, 0.18);
      --accent: #22c55e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.22), transparent 28%),
        linear-gradient(180deg, #0a1326, var(--bg));
    }

    main {
      width: min(560px, 100%);
      padding: 28px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 2.8rem);
    }

    p {
      line-height: 1.7;
      color: var(--muted);
    }

    .status {
      margin: 20px 0;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
    }

    .row {
      margin-top: 14px;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .value {
      font-weight: 700;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .login-form,
    .reset-form {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.88);
      color: var(--text);
      font: inherit;
    }

    .helper {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .reports {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .reports h2 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    .reports-status {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .reports-list {
      display: grid;
      gap: 14px;
    }

    .report-card {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.72);
    }

    .report-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .report-title {
      font-weight: 700;
      color: var(--text);
    }

    .report-time {
      font-size: 0.84rem;
      color: var(--muted);
    }

    .report-meta {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .report-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.85);
      color: var(--text);
      white-space: pre-wrap;
      line-height: 1.65;
    }

    .report-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button,
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid transparent;
      font: inherit;
      text-decoration: none;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      color: #052e16;
      font-weight: 700;
    }

    button.secondary,
    a.secondary {
      border-color: var(--border);
      background: transparent;
      color: var(--text);
    }

    .danger {
      background: rgba(239, 68, 68, 0.16);
      color: #fecaca;
    }
  </style>
</head>
<body>
  <main>
    <h1>Owner Console</h1>
    <p>こちらで owner としてログインしておくと、サイト上のコメント削除と通報確認をご利用いただけます。</p>

    <div class="row">
      <span class="label">ownerEmail</span>
    </div>

    <div class="status" data-owner-page-status>
      読み込んでいます...
    </div>

    <form class="login-form" data-owner-login-form>
      <label class="field">
        <span class="label">パスワード</span>
        <input class="input" type="password" autocomplete="current-password" data-owner-password />
      </label>
      <p class="helper">通常のログイン用です。初回設定やお忘れの場合は、下のボタンから再設定メールを送信できます。</p>
      <div class="actions">
        <button type="submit" data-owner-page-login>ログイン</button>
        <button type="button" class="secondary" data-owner-page-signup>初回登録</button>
        <button type="button" class="secondary" data-owner-page-reset>パスワード再設定</button>
        <button type="button" class="secondary" data-owner-page-logout hidden>ログアウト</button>
        <a class="secondary" href="index.html">ホームへ戻る</a>
      </div>
    </form>

    <form class="reset-form" data-owner-reset-form hidden>
      <label class="field">
        <span class="label">新しいパスワード</span>
        <input class="input" type="password" autocomplete="new-password" data-owner-new-password />
      </label>
      <p class="helper">再設定メールからアクセスした場合のみ表示されます。保存後は通常のログイン画面へ戻れます。</p>
      <div class="actions">
        <button type="submit" data-owner-page-save-password>新しいパスワードを保存</button>
      </div>
    </form>

    <section class="reports">
      <h2>通報一覧</h2>
      <p class="reports-status" data-owner-reports-status>ログインすると表示されます。</p>
      <div class="reports-list" data-owner-reports-list></div>
    </section>
  </main>

  <script src="site-interactions-config.js"></script>
  <script type="module" src="owner.js"></script>
</body>
</html>
