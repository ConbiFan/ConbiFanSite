<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="favicon.png">
  <title>Conbi Fan - Owner</title>
  <style>
    :root {
      --bg: #09111f;
      --panel: rgba(15, 23, 42, 0.86);
      --border: rgba(148, 163, 184, 0.18);
      --accent: #22c55e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.22), transparent 28%),
        linear-gradient(180deg, #0a1326, var(--bg));
    }

    main {
      width: min(560px, 100%);
      padding: 28px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 2.8rem);
    }

    p {
      line-height: 1.7;
      color: var(--muted);
    }

    .status {
      margin: 20px 0;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
    }

    .row {
      margin-top: 14px;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .value {
      font-weight: 700;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    button,
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid transparent;
      font: inherit;
      text-decoration: none;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      color: #052e16;
      font-weight: 700;
    }

    button.secondary,
    a.secondary {
      border-color: var(--border);
      background: transparent;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <h1>Owner Console</h1>
    <p>ここで owner ログインしておけば、サイト上のコメント削除が自分だけ使える。</p>

    <div class="row">
      <span class="label">ownerEmail</span>
      <div class="value" data-owner-page-email></div>
    </div>

    <div class="status" data-owner-page-status>
      読み込み中...
    </div>

    <div class="actions">
      <button type="button" data-owner-page-login>magic link を送る</button>
      <button type="button" class="secondary" data-owner-page-logout hidden>ログアウト</button>
      <a class="secondary" href="index.html">ホームへ戻る</a>
    </div>
  </main>

  <script src="site-interactions-config.js"></script>
  <script type="module" src="owner.js"></script>
</body>
</html>
