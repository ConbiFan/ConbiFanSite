  <title>Conbi Fan - ダウンロード</title>
  <link rel="stylesheet" href="site-interactions.css">
  <style>
    :root {
      --cf-accent: #3b82f6;
      --cf-accent-soft: rgba(59, 130, 246, 0.2);
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f1220;
      color: #eaeaf0;
      padding: 32px;
    }
    h1 {
      text-align: center;
      margin-bottom: 32px;
    }
    .download-card {
      background: #1b1f3a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

      color: #93c5fd;
      text-decoration: none;

    }

<body>
  <h1>作品ダウンロード</h1>

  <div
    class="download-card"
    data-entry-engagement="download-badmod"
    data-engagement-note="コメントといいねは共有保存。報告は owner 側の一覧へ送られる。"
    data-comment-placeholder="理不尽ポイントとか、好きだった要素とか書ける"
    data-form-label="Bad Mod の感想"
    data-meta-text="遊んだ感想を残せる"
    data-item-label="Bad Mod"
  >
    <h2>Bad Mod</h2>
    <p>マイクラが理不尽になるModです(対応環境はForge 1.20.1)
    </p>
    <a href="downloads/badmod-1.0.0-forge-1.20.1.jar" download>ダウンロード</a>
  </div>

  <div
    class="download-card"
    data-entry-engagement="download-joinleavemessage"
    data-engagement-note="コメントといいねは共有保存。報告は owner 側の一覧へ送られる。"
    data-comment-placeholder="使ってみた感想とか、入れたサーバーの雰囲気とかどうぞ"
    data-form-label="JoinLeaveMessage Plugin の感想"
    data-meta-text="使った感想を残せる"
    data-item-label="JoinLeaveMessage Plugin"
  >
    <h2>JoinLeaveMessage Plugin</h2>
    <p>Java用のプラグインです(対応環境は1.8から)
    </p>
    <a href="downloads/JoinLeaveMessages-1.0.jar" download>ダウンロード</a>
  </div>

  <div
    class="download-card"
    data-entry-engagement="download-mini-conbi-fan-addon"
    data-engagement-note="コメントといいねは共有保存。報告は owner 側の一覧へ送られる。"
    data-comment-placeholder="遊んだ感想とか、スクショ欲が出た場面とかどうぞ"
    data-form-label="Mini Conbi Fan Addon の感想"
    data-meta-text="反応を置いていける"
    data-item-label="Mini Conbi Fan Addon"
  >
    <h2>Mini Conbi Fan Addon</h2>
    <p>マイクラ統合版にMini Conbi Fanを追加します。
    </p>
    <a href="downloads/Mini Conbi Fan Addon.mcaddon" download>ダウンロード</a>
  </div>

  <div
    class="download-card"
    data-entry-engagement="download-random-effect"
    data-engagement-note="コメントといいねは共有保存。報告は owner 側の一覧へ送られる。"
    data-comment-placeholder="刺さったエフェクト事故とか、遊んだ感想とかどうぞ"
    data-form-label="Random Effect の感想"
    data-meta-text="プレイ感想を残せる"
    data-item-label="Random Effect"
  >
    <h2>Random Effect</h2>
    <p>マイクラで5分ごとにプレイヤーにランダムなエフェクトを30秒間付与するデータパックです。（対応環境は通常の1.21.5）
    </p>
    <a href="downloads/Random Effect.zip" download>ダウンロード</a>
  </div>

  <p style="text-align:center; margin-top:40px;">
